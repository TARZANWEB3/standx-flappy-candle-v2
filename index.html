.st{font-family:'JetBrains Mono',monospace;font-size:13px;color:#5a6a7c;margin:3px;letter-spacing:1px;display:flex;align-items:center;gap:6px;justify-content:center}.st img{width:20px;height:20px}
.bsc{font-family:'Orbitron',monospace;font-size:56px;font-weight:900;margin:4px 0;letter-spacing:4px}
.nr{font-family:'Orbitron',monospace;font-size:10px;color:#ffe600;letter-spacing:5px;animation:pl 1s infinite}@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bb{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}.bb{animation:bb 2.8s ease-in-out infinite}
.dv{width:100px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,232,50,0.15),transparent);margin:6px 0}
.ni{background:rgba(0,232,50,0.05);border:1px solid rgba(0,232,50,0.15);border-radius:8px;padding:10px 20px;font-family:'Orbitron',monospace;font-size:14px;color:#00e832;text-align:center;outline:none;width:200px;margin:8px;letter-spacing:2px}.ni::placeholder{color:rgba(0,232,50,0.25)}
.lb{margin-top:6px;width:85%;max-width:260px}.lb-t{font-family:'Orbitron',monospace;font-size:9px;color:#3a4a5c;letter-spacing:3px;text-align:center;margin-bottom:4px;text-transform:uppercase}
.lb-r{display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 8px;border-radius:4px;margin:1px 0}.lb-r:nth-child(even){background:rgba(0,232,50,0.02)}.lb-r.me{background:rgba(0,232,50,0.08);border:1px solid rgba(0,232,50,0.12)}
.lb-n{color:#3a5a3c;width:18px}.lb-nm{color:#aaa;flex:1;margin:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.lb-s{color:#00e832;font-weight:700}
.btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:4px}

async function fbFetch(path,method,body){
  try{
    const opts={method:method||'GET',headers:{'Content-Type':'application/json'}};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(FB_URL+path+'.json',opts);
    if(!r.ok)return null;
    return await r.json();
  }catch(e){return null}
}

async function loadLB(){
  try{
    const data=await fbFetch('','GET');
    if(data!==null){
      fbOnline=true;
      lb=Object.values(data||{});
      lb.sort((a,b)=>b.s-a.s);
      try{localStorage.setItem(LS_KEY,JSON.stringify(lb))}catch(e){}
    }else{
      fbOnline=false;
      const raw=localStorage.getItem(LS_KEY);
      lb=raw?JSON.parse(raw):[];
    }
  }catch(e){
    fbOnline=false;
    try{const raw=localStorage.getItem(LS_KEY);lb=raw?JSON.parse(raw):[];}catch(ex){lb=[];}
  }
  renderLB('menuLB');
}

async function addToLB(name,score,dusd){
  const entry={n:name||'ANON',s:score,d:dusd,t:Date.now()};
  try{
    if(fbOnline){
      await fbFetch('/'+Date.now()+'_'+Math.random().toString(36).slice(2),'PUT',entry);
      await loadLB();
    }else{
      lb.push(entry);
      lb.sort((a,b)=>b.s-a.s);
      lb=lb.slice(0,50);
      try{localStorage.setItem(LS_KEY,JSON.stringify(lb))}catch(e){}
    }
  }catch(e){
    lb.push(entry);
    lb.sort((a,b)=>b.s-a.s);
    lb=lb.slice(0,50);
    try{localStorage.setItem(LS_KEY,JSON.stringify(lb))}catch(ex){}
  }
}

function renderLB(elId){
  const div=document.getElementById(elId);if(!div)return;
  const title=fbOnline?'🌍 GLOBAL RANKING':'📱 LOCAL RANKING';
  if(lb.length===0){div.innerHTML=`<div class="lb-t">${title}</div><div class="lb-t">NO SCORES YET</div>`;return}
  let h=`<div class="lb-t">${title}</div>`;
  lb.slice(0,10).forEach((e,i)=>{
    const isMe=e.n===nick&&e.s===sc;
    h+=`<div class="lb-r ${isMe?'me':''}"><span class="lb-n">${i+1}.</span><span class="lb-nm">${e.n}</span><span class="lb-s">${e.s}</span></div>`;
  });
  div.innerHTML=h;
}

function generateShareCard(){
  const cv=document.getElementById('shareCanvas');
  const cx=cv.getContext('2d');
  const w=600,h=340;cv.width=w;cv.height=h;

  // BG
  const g=cx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#060a12');g.addColorStop(1,'#0c1424');
  cx.fillStyle=g;cx.fillRect(0,0,w,h);

  // Grid
  cx.strokeStyle='rgba(0,232,50,0.03)';cx.lineWidth=1;
  for(let y=0;y<h;y+=30){cx.beginPath();cx.moveTo(0,y);cx.lineTo(w,y);cx.stroke()}

  // Green accent line
  cx.strokeStyle='rgba(0,232,50,0.15)';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(0,h-3);cx.lineTo(w,h-3);cx.stroke();
  cx.beginPath();cx.moveTo(0,3);cx.lineTo(w,3);cx.stroke();

  // Logo
  try{cx.drawImage(im.lg,w/2-70,18,140,25)}catch(e){}

  // Title
  cx.font='bold 18px Orbitron';cx.fillStyle='#00e832';cx.textAlign='center';
  cx.shadowColor='rgba(0,232,50,0.4)';cx.shadowBlur=15;
  cx.fillText('FLAPPY CANDLE',w/2,68);cx.shadowBlur=0;

  // Score
  cx.font='bold 64px Orbitron';
  cx.fillStyle=sc>=15?'#00e832':'#ff3366';
  cx.shadowColor=sc>=15?'rgba(0,232,50,0.4)':'rgba(255,51,102,0.4)';cx.shadowBlur=20;
  cx.fillText(sc,w/2,155);cx.shadowBlur=0;

  cx.font='bold 11px JetBrains Mono';cx.fillStyle='#5a6a7c';
  cx.fillText('SCORE',w/2,170);

  // DUSD
  cx.font='bold 14px Orbitron';cx.fillStyle='#e8c020';
  try{cx.drawImage(im.d,w/2-50,185,28,28)}catch(e){}
  cx.textAlign='left';cx.fillText(ds+' DUSD',w/2-16,206);cx.textAlign='center';

  // Mascot
  let msc=im.p;
  if(sc>=15)msc=im.h;
  if(sc>=5&&sc<15)msc=im.ha;
  if(bst>0&&sc>=bst)msc=im.ri;
  try{cx.globalAlpha=0.85;cx.drawImage(msc,22,80,90,90);cx.globalAlpha=1}catch(e){}

  // Nick
  cx.font='bold 13px Orbitron';cx.fillStyle='#00e832';
  cx.fillText(nick||'ANONYMOUS',w/2,240);

  // CTA
  cx.font='bold 10px JetBrains Mono';cx.fillStyle='#3a4a5c';
  cx.fillText('Can you beat my score?',w/2,275);
  cx.fillStyle='#00e832';cx.fillText('#StandX  #FlappyCandle  #DeFi',w/2,295);

  // Border
  cx.strokeStyle='rgba(0,232,50,0.1)';cx.lineWidth=1;cx.strokeRect(1,1,w-2,h-2);

  return cv;
}

async function shareResult(){
  const cv=generateShareCard();
  try{
    const blob=await new Promise(r=>cv.toBlob(r,'image/png'));
    if(navigator.share&&navigator.canShare){
      const file=new File([blob],'standx-flappy-score.png',{type:'image/png'});
      const data={title:'StandX Flappy Candle',text:'Score: '+sc+' | DUSD: '+ds+' #StandX #FlappyCandle',files:[file]};
      if(navigator.canShare(data)){await navigator.share(data);return}
    }
    // Fallback: download
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='standx-flappy-'+sc+'pts.png';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    document.getElementById('bSh').textContent='DOWNLOADED!';
    setTimeout(()=>document.getElementById('bSh').textContent='SHARE RESULT',2000);
  }catch(e){
    // Final fallback: copy text
    const txt='StandX Flappy Candle | Score: '+sc+' | DUSD: '+ds+' | #StandX #FlappyCandle #DeFi';
    try{await navigator.clipboard.writeText(txt);document.getElementById('bSh').textContent='COPIED!';setTimeout(()=>document.getElementById('bSh').textContent='SHARE RESULT',2000)}catch(e2){}
  }
}
document.getElementById('bSh').onclick=shareResult;

function startM(){
  if(mPlaying||!actx)return;mPlaying=true;mIdx=0;
  mGain=actx.createGain();mGain.gain.value=muted?0:0.06;mGain.connect(actx.destination);
  function nxt(){
    if(!mPlaying)return;
    const[f,d]=mel[mIdx%mel.length];
    if(f>0){
      // Lead voice - soft square wave
      const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(0.055,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d*0.9);
      o.connect(g);g.connect(mGain);o.start();o.stop(actx.currentTime+d);
      // Warm pad - triangle sub octave
      const o2=actx.createOscillator(),g2=actx.createGain();o2.type='triangle';o2.frequency.value=f*0.5;
      g2.gain.setValueAtTime(0.04,actx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d*0.8);
      o2.connect(g2);g2.connect(mGain);o2.start();o2.stop(actx.currentTime+d);
      // Gentle shimmer - sine high octave on every 3rd note
      if(mIdx%3===0){const o3=actx.createOscillator(),g3=actx.createGain();o3.type='sine';o3.frequency.value=f*2;
      g3.gain.setValueAtTime(0.015,actx.currentTime);g3.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d*0.5);
      o3.connect(g3);g3.connect(mGain);o3.start();o3.stop(actx.currentTime+d*0.6)}
      // Soft bass on long notes
      if(d>=0.5){const ob=actx.createOscillator(),gb=actx.createGain();ob.type='sine';ob.frequency.value=f*0.25;
      gb.gain.setValueAtTime(0.03,actx.currentTime);gb.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d*0.7);
      ob.connect(gb);gb.connect(mGain);ob.start();ob.stop(actx.currentTime+d)}
    }
    mIdx++;mInt=setTimeout(nxt,d*520);
  }
  nxt();
}
function stopM(){mPlaying=false;if(mInt)clearTimeout(mInt)}

// ===== GAME =====
const GR=0.22,FLP=-4.5,MXV=5.5;
function mkBd(){return{x:W*0.26,y:H*0.45,vy:0,w:115,h:83,rot:0,ft:0}}
function mkP(px){const g=Math.max(gp,125);const tM=H-g-100,tm=80;const tH=tm+Math.random()*(tM-tm);return{x:px!=null?px:W+50,tH,g,sc:false,gr:Math.random()>0.28,coin:Math.random()>0.3,ct:false}}
function mkPt(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=1+Math.random()*5;pt.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:24+Math.random()*20,ml:44,c,sz:1.5+Math.random()*3.5})}}
function mkFt(x,y,t,c,s){pt.push({x,y,vx:0,vy:-1.5,l:50,ml:50,c,sz:s||18,txt:t})}
function mkBr(){const ts=['logo','delta','text'];const t=ts[Math.floor(Math.random()*3)];const tx=['StandX','PERPS','TRADE','DUSD','DeFi','YIELD','LONG','SHORT'];return{x:W+150,y:40+Math.random()*(H-80),t,text:tx[Math.floor(Math.random()*tx.length)],a:0.04+Math.random()*0.05,sc:0.5+Math.random()*0.8,sp:0.2+Math.random()*0.4}}
function mkSt(){return{x:Math.random()*W,y:Math.random()*H,sz:0.5+Math.random()*1.5,sp:0.3+Math.random()*0.8,tw:Math.random()*6.28}}
function mkCl(){return{x:W+200,y:30+Math.random()*(H-60),w:80+Math.random()*120,h:15+Math.random()*25,a:0.015+Math.random()*0.02,sp:0.15+Math.random()*0.3}}
function mkNb(){return{x:Math.random()*W,y:Math.random()*H,r:40+Math.random()*80,a:0.008+Math.random()*0.012,c:Math.random()>0.5?'0,232,50':'0,180,220',ph:Math.random()*6.28}}

function init(){
  bd=mkBd();pp=[];pt=[];sc=0;ds=0;fr=0;sh=0;dt=0;milestone=0;
  sp=1.8;gp=Math.min(H*0.48,230);pW=60;
  brands=[];stars=[];clouds=[];nebula=[];
  for(let i=0;i<6;i++)brands.push(Object.assign(mkBr(),{x:Math.random()*W}));
  for(let i=0;i<30;i++)stars.push(mkSt());
  for(let i=0;i<4;i++)clouds.push(Object.assign(mkCl(),{x:Math.random()*W}));
  for(let i=0;i<3;i++)nebula.push(mkNb());
  // Candles appear after ~3 seconds (at speed 1.5, about 90px/sec, so place at ~270px from right)
  const startX=W+140;
  pp.push(mkP(startX));pp.push(mkP(startX+320));pp.push(mkP(startX+640));
}

function flap(){if(st!=='play')return;bd.vy=FLP;bd.ft=12;sfxFlap();mkPt(bd.x-25,bd.y+18,'rgba(255,190,50,0.5)',5)}
function start(){
  nick=document.getElementById('nickIn').value.trim()||'ANON';
  try{localStorage.setItem('sx_nick',nick)}catch(e){}
  initA();init();st='play';startM();
  document.getElementById('ms').classList.add('h');document.getElementById('os').classList.add('h');
  document.getElementById('sH').classList.add('v');document.getElementById('dH').classList.add('v');
  document.getElementById('sH').textContent='0';document.getElementById('dV').textContent='0';
  requestAnimationFrame(loop);
}
function die(){
  if(st==='dead')return;st='dead';sh=18;dt=0;sfxDie();stopM();
  mkPt(bd.x,bd.y,'#ff3366',35);
  const rec=sc>bst;if(rec)bst=sc;
  addToLB(nick,sc,ds);
  setTimeout(async()=>{
    await loadLB();
    document.getElementById('sH').classList.remove('v');document.getElementById('dH').classList.remove('v');
    document.getElementById('os').classList.remove('h');
    document.getElementById('oS').textContent=sc;document.getElementById('oD').textContent=ds;
    renderLB('overLB');
    const mE=document.getElementById('oM'),tE=document.getElementById('oT'),rE=document.getElementById('oR'),sE=document.getElementById('oS');
    if(rec&&sc>0){mE.src=SR.ri;mE.style.width='200px';tE.textContent='WHALE MODE';tE.style.color='#ffe600';tE.style.textShadow='0 0 28px rgba(255,230,0,0.45)';rE.style.display='block';sE.style.color='#ffe600';sE.style.textShadow='0 0 50px rgba(255,230,0,0.3)'}
    else if(sc>=15){mE.src=SR.h;mE.style.width='170px';tE.textContent='GOOD TRADE';tE.style.color='#00e832';tE.style.textShadow='0 0 24px rgba(0,232,50,0.4)';rE.style.display='none';sE.style.color='#00e832';sE.style.textShadow='0 0 40px rgba(0,232,50,0.3)'}
    else if(sc>=5){mE.src=SR.ha;mE.style.width='170px';tE.textContent='LIQUIDATED';tE.style.color='#ff3366';tE.style.textShadow='0 0 24px rgba(255,51,102,0.4)';rE.style.display='none';sE.style.color='#ff3366';sE.style.textShadow='0 0 40px rgba(255,51,102,0.3)'}
    else{mE.src=SR.p;mE.style.width='170px';tE.textContent='REKT';tE.style.color='#ff3366';tE.style.textShadow='0 0 24px rgba(255,51,102,0.4)';rE.style.display='none';sE.style.color='#ff3366';sE.style.textShadow='0 0 40px rgba(255,51,102,0.3)'}
  },900);
}

document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();if(st==='menu')start();else flap()}});
C.addEventListener('pointerdown',e=>{e.preventDefault();if(st==='play')flap()});
document.getElementById('bG').onclick=start;
document.getElementById('bD').onclick=start;
document.getElementById('bM').onclick=function(){st='menu';stopM();document.getElementById('os').classList.add('h');document.getElementById('ms').classList.remove('h');document.getElementById('sH').classList.remove('v');document.getElementById('dH').classList.remove('v');init();loadLB();menuBg()};

function update(){
  fr++;const spM=st==='play'?sp:1;
  brands.forEach(b=>b.x-=b.sp*spM);brands=brands.filter(b=>b.x>-200);if(brands.length<7&&Math.random()<0.02)brands.push(mkBr());
  stars.forEach(s=>{s.x-=s.sp*spM;s.tw+=0.03;if(s.x<-5){s.x=W+5;s.y=Math.random()*H}});
  clouds.forEach(c=>{c.x-=c.sp*spM;if(c.x<-c.w-20){c.x=W+100;c.y=30+Math.random()*(H-60)}});
  nebula.forEach(n=>n.ph+=0.005);

  if(st==='dead'){dt++;if(bd.y<H+100){bd.vy+=GR*1.3;bd.y+=bd.vy;bd.rot=Math.min(bd.rot+3,90)}
    pt.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(!p.txt)p.vy+=0.08;p.l--});pt=pt.filter(p=>p.l>0);if(sh>0)sh--;return}
  if(st!=='play')return;

  // VERY gradual difficulty
  sp=1.8+sc*0.014;if(sp>3.8)sp=3.8;
  gp=Math.max(Math.min(H*0.48,230)-sc*0.25,125);

  if(sc>0&&sc%10===0&&sc!==milestone){milestone=sc;sfxLv();mkFt(W/2,H/2-40,'LEVEL UP!','#ffe600',24)}

  bd.vy+=GR;if(bd.vy>MXV)bd.vy=MXV;bd.y+=bd.vy;
  if(bd.vy<-0.3)bd.rot=Math.max(bd.rot-5,-28);else bd.rot=Math.min(bd.rot+1.5,42);
  if(bd.ft>0)bd.ft--;

  pp.forEach(p=>p.x-=sp);pp=pp.filter(p=>p.x>-pW-20);
  const last=pp[pp.length-1];
  const spacing=Math.max(340-sc*0.8,220);
  if(!last||last.x<W-spacing-Math.random()*40)pp.push(mkP());

  pp.forEach(p=>{
    if(!p.sc&&p.x+pW<bd.x){p.sc=true;sc++;document.getElementById('sH').textContent=sc;sfxPt();mkPt(bd.x,bd.y-20,'#00e832',6);mkFt(bd.x+35,bd.y-30,'+1','#00e832',18)}
    if(p.coin&&!p.ct){const cx=p.x+pW/2,cy=p.tH+p.g/2,dx=bd.x-cx,dy=bd.y-cy;
      if(Math.sqrt(dx*dx+dy*dy)<50){p.ct=true;ds++;sc+=3;document.getElementById('sH').textContent=sc;document.getElementById('dV').textContent=ds;sfxCoin();mkPt(cx,cy,'#e8c020',14);mkFt(cx+25,cy-30,'+3 DUSD','#e8c020',20)}}
  });

  // ULTRA forgiving hitbox
  const bx=bd.x,by=bd.y,bw=bd.w*0.22,bh=bd.h*0.22;
  pp.forEach(p=>{if(bx+bw>p.x+10&&bx-bw<p.x+pW-10){if(by-bh<p.tH-6||by+bh>p.tH+p.g+6)die()}});
  if(by+bh>H-6)die();if(by-bh<6)die();

  pt.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(!p.txt)p.vy+=0.08;p.l--});pt=pt.filter(p=>p.l>0);if(sh>0)sh--;
}

function draw(){
  X.save();if(sh>0)X.translate((Math.random()-.5)*sh*2.2,(Math.random()-.5)*sh*2.2);
  const bg=X.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#050810');bg.addColorStop(0.25,'#0a1020');bg.addColorStop(0.6,'#080e1a');bg.addColorStop(1,'#060c16');X.fillStyle=bg;X.fillRect(0,0,W,H);
  // Nebula
  nebula.forEach(n=>{const a=n.a*(0.7+Math.sin(n.ph)*0.3);X.globalAlpha=a;const ng=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);ng.addColorStop(0,'rgba('+n.c+',0.15)');ng.addColorStop(0.5,'rgba('+n.c+',0.05)');ng.addColorStop(1,'transparent');X.fillStyle=ng;X.beginPath();X.arc(n.x,n.y,n.r,0,6.28);X.fill()});X.globalAlpha=1;
  // Stars
  stars.forEach(s=>{const tw=0.5+Math.sin(s.tw)*0.5;X.globalAlpha=0.3+tw*0.5;X.fillStyle='#fff';X.beginPath();X.arc(s.x,s.y,s.sz*tw,0,6.28);X.fill()});X.globalAlpha=1;
  // Clouds
  clouds.forEach(c=>{X.globalAlpha=c.a;const cg=X.createLinearGradient(c.x,c.y,c.x+c.w,c.y+c.h);cg.addColorStop(0,'transparent');cg.addColorStop(0.3,'rgba(20,35,55,0.8)');cg.addColorStop(0.7,'rgba(20,35,55,0.8)');cg.addColorStop(1,'transparent');X.fillStyle=cg;X.beginPath();X.ellipse(c.x+c.w/2,c.y+c.h/2,c.w/2,c.h/2,0,0,6.28);X.fill()});X.globalAlpha=1;
  // Grid
  X.strokeStyle='rgba(0,232,50,0.014)';X.lineWidth=1;for(let y=0;y<H;y+=42){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}for(let x=(-fr*0.35)%60;x<W;x+=60){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  // Branding
  brands.forEach(br=>{X.globalAlpha=br.a;if(br.t==='logo'){try{X.drawImage(im.lg,br.x,br.y,130*br.sc,23*br.sc)}catch(e){}}else if(br.t==='delta'){try{X.drawImage(im.dl,br.x,br.y,65*br.sc,65*br.sc)}catch(e){}}else{X.font='bold '+(14*br.sc)+'px Orbitron';X.fillStyle='#00e832';X.textAlign='left';X.fillText(br.text,br.x,br.y)}});X.globalAlpha=1;
  // Chart
  X.strokeStyle='rgba(0,232,50,0.03)';X.lineWidth=1.5;X.beginPath();let ly=H*0.5;for(let x=0;x<W;x+=3){ly+=Math.sin((x+fr)*0.014)*1.2+(Math.random()-.5)*0.3;ly=Math.max(H*.1,Math.min(H*.9,ly));x===0?X.moveTo(x,ly):X.lineTo(x,ly)}X.stroke();
  // Candles
  pp.forEach(p=>{
    const col=p.gr?'#00e832':'#ff3366',cD=p.gr?'#007a1e':'#aa1640',cL=p.gr?'#44ff70':'#ff7799',cG=p.gr?'rgba(0,232,50,':'rgba(255,51,102,';const tH=p.tH,bY=tH+p.g;
    let tg=X.createLinearGradient(p.x,0,p.x+pW,0);tg.addColorStop(0,cD);tg.addColorStop(0.1,col);tg.addColorStop(0.9,col);tg.addColorStop(1,cD);X.fillStyle=tg;X.fillRect(p.x,0,pW,tH);
    X.fillStyle=cD;X.fillRect(p.x+pW/2-2.5,tH,5,14);
    let cg=X.createLinearGradient(p.x-8,0,p.x+pW+8,0);cg.addColorStop(0,cD);cg.addColorStop(0.15,cL);cg.addColorStop(0.5,col);cg.addColorStop(0.85,cL);cg.addColorStop(1,cD);X.fillStyle=cg;X.beginPath();X.roundRect(p.x-8,tH-7,pW+16,9,[0,0,4,4]);X.fill();
    X.fillStyle='rgba(255,255,255,0.035)';X.fillRect(p.x+5,0,9,tH);X.shadowColor=col;X.shadowBlur=18;X.fillStyle=cG+'0.1)';X.fillRect(p.x-12,tH-3,pW+24,7);X.shadowBlur=0;
    tg=X.createLinearGradient(p.x,0,p.x+pW,0);tg.addColorStop(0,cD);tg.addColorStop(0.1,col);tg.addColorStop(0.9,col);tg.addColorStop(1,cD);X.fillStyle=tg;X.fillRect(p.x,bY,pW,H-bY);
    X.fillStyle=cD;X.fillRect(p.x+pW/2-2.5,bY-14,5,14);
    cg=X.createLinearGradient(p.x-8,0,p.x+pW+8,0);cg.addColorStop(0,cD);cg.addColorStop(0.15,cL);cg.addColorStop(0.5,col);cg.addColorStop(0.85,cL);cg.addColorStop(1,cD);X.fillStyle=cg;X.beginPath();X.roundRect(p.x-8,bY-2,pW+16,9,[4,4,0,0]);X.fill();
    X.fillStyle='rgba(255,255,255,0.035)';X.fillRect(p.x+5,bY,9,H-bY);X.shadowColor=col;X.shadowBlur=18;X.fillStyle=cG+'0.1)';X.fillRect(p.x-12,bY-2,pW+24,7);X.shadowBlur=0;
    // DUSD
    if(p.coin&&!p.ct){const cx=p.x+pW/2,cy=tH+p.g/2,bob=Math.sin(fr*0.05)*9,csz=56;
      X.globalAlpha=0.2;X.shadowColor='#ffe040';X.shadowBlur=40;X.beginPath();X.arc(cx,cy+bob,csz/2+14,0,6.28);X.fillStyle='#e8c020';X.fill();X.shadowBlur=0;
      X.globalAlpha=0.5;const cGr=X.createRadialGradient(cx,cy+bob,csz/2-8,cx,cy+bob,csz/2+10);cGr.addColorStop(0,'rgba(255,224,64,0.6)');cGr.addColorStop(1,'transparent');X.fillStyle=cGr;X.beginPath();X.arc(cx,cy+bob,csz/2+10,0,6.28);X.fill();X.globalAlpha=1;
      X.save();X.translate(cx,cy+bob);X.rotate(Math.sin(fr*0.03)*0.1);X.drawImage(im.d,-csz/2,-csz/2,csz,csz);X.restore()}
  });
  // Bird
  const alive=st!=='dead'||(st==='dead'&&dt<70);
  if(alive){X.save();X.translate(bd.x,bd.y);X.rotate(bd.rot*Math.PI/180);
    if(st==='play'){const fl=bd.ft>0?28:14;const fg=X.createRadialGradient(-bd.w/2-10,10,2,-bd.w/2-10,10,fl);fg.addColorStop(0,'rgba(255,200,50,0.7)');fg.addColorStop(0.3,'rgba(255,120,20,0.35)');fg.addColorStop(0.6,'rgba(255,60,10,0.12)');fg.addColorStop(1,'transparent');X.globalAlpha=0.75;X.fillStyle=fg;X.beginPath();X.arc(-bd.w/2-10,10,fl,0,6.28);X.fill();
      if(bd.ft>4){X.globalAlpha=0.5;X.fillStyle='#ffe880';for(let i=0;i<3;i++){X.beginPath();X.arc(-bd.w/2-12-Math.random()*18,8+Math.random()*8-4,1+Math.random()*2,0,6.28);X.fill()}}}
    X.globalAlpha=0.1;X.shadowColor='#00e832';X.shadowBlur=35;X.drawImage(im.r,-bd.w/2-5,-bd.h/2-5,bd.w+10,bd.h+10);X.shadowBlur=0;X.globalAlpha=1;X.drawImage(im.r,-bd.w/2,-bd.h/2,bd.w,bd.h);X.restore()}
  // Particles
  pt.forEach(p=>{if(p.txt){X.globalAlpha=p.l/p.ml;X.font='bold '+p.sz+'px Orbitron';X.textAlign='center';X.shadowColor=p.c;X.shadowBlur=10;X.fillStyle=p.c;X.fillText(p.txt,p.x,p.y);X.shadowBlur=0}else{X.globalAlpha=p.l/p.ml;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.sz*(p.l/p.ml),0,6.28);X.fill()}});X.globalAlpha=1;
  // Floor/ceiling
  X.shadowColor='#00e832';X.shadowBlur=6;X.strokeStyle='rgba(0,232,50,0.05)';X.lineWidth=1;X.beginPath();X.moveTo(0,H-1);X.lineTo(W,H-1);X.stroke();X.beginPath();X.moveTo(0,1);X.lineTo(W,1);X.stroke();X.shadowBlur=0;
  X.restore();
}

function loop(){update();draw();if(st==='play'||(st==='dead'&&dt<70))requestAnimationFrame(loop)}
function menuBg(){if(st!=='menu'){requestAnimationFrame(menuBg);return}fr++;update();draw();requestAnimationFrame(menuBg)}
init();loadLB();menuBg();
</script>
